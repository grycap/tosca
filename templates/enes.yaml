tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - grycap_custom_types: https://raw.githubusercontent.com/grycap/tosca/main/custom_types.yaml

description: >
  Install ENES Data Space service. on top of a Kubernetes Cluster.

metadata:
  template_version: "1.0.0"
  template_name: ENES Data Space service
  display_name: ENES Data Space service on top of Kubernetes

topology_template:

  inputs:
    fe_cpus:
      type: integer
      description: Number of CPUs for the front-end node
      default: 2
    fe_mem:
      type: scalar-unit.size
      description: Amount of Memory for the front-end node
      default: 4 GB
    fe_disk_size:
      type: scalar-unit.size
      description: Size of the disk to be attached to the FE instance (Set 0 if disk is not needed)
      default: 100 GB

    wn_num:
      type: integer
      description: Number of WNs in the cluster
      default: 1
    wn_cpus:
      type: integer
      description: Number of CPUs for the WNs
      default: 4
    wn_mem:
      type: scalar-unit.size
      description: Amount of Memory for the WNs
      default: 8 GB
    wn_disk_size:
      type: scalar-unit.size
      description: Size of the root disk of the WNs (in case of 0 disk will no be resized)
      default: 40 GB

    dns_name:
      type: string
      description: DNS name to set to the Kubernetes Front-end
      default: ""
      required: yes

    kube_version:
      type: string
      description: Version of Kubernetes to install
      default: "1.30.4"

    storage_size:
      type: string
      description: Size of the ENES data PersistentVolumeClaim
      default: 8 Gi
      required: yes
    jupyterhub_crypt_key:
      type: string
      description: Hex-encoded 32-byte key to crypt jupyterhub ('openssl rand -hex 32')
      default: c924b40b9ae0afba637e297773d27a50c3e9ba4c8a7910f0dd826df1e6c2104d
      required: yes
    enes_oidc_issuer:
      type: string
      description: OIDC Issuer URL
      default: 'https://aai.egi.eu/auth/realms/egi'
      required: yes
      constraints:
        - valid_values:
            - 'https://aai.egi.eu/auth/realms/egi'
            - 'https://aai-demo.egi.eu/auth/realms/egi'
            - 'https://aai-dev.egi.eu/auth/realms/egi'
    enes_client_id:
      type: string
      description: OIDC Client ID
      default: ''
      required: yes
    enes_client_secret:
      type: string
      description: OIDC Client Secret
      default: ''
      required: yes
    enes_admin_email:
      type: string
      description: ENES instance SMTP email
      default: ''
      required: yes
    enes_mailhub:
      type: string
      description: ENES instance SMTP mailhub
      default: ''
      required: yes
    enes_email_pass:
      type: string
      description: ENES instance SMTP password
      default: ''
      required: yes

  node_templates:

    enes:
      type: tosca.nodes.SoftwareComponent
      requirements:
        - host: lrms_front_end
      interfaces:
        Standard:
          configure:
            implementation: https://raw.githubusercontent.com/grycap/tosca/main/artifacts/enes/enes.yml
            inputs:
              enes_dns_name: { get_input: dns_name }
              storage_size: { get_input: storage_size }
              enes_jupyterhub_crypt_key: { get_input: jupyterhub_crypt_key }
              enes_oidc_issuer: { get_input: enes_oidc_issuer }
              enes_client_secret: { get_input: enes_client_secret }
              enes_client_id: { get_input: enes_client_id }
              enes_admin_email: { get_input: enes_admin_email }
              enes_mailhub: { get_input: enes_mailhub }
              enes_email_pass: { get_input: enes_email_pass }

    lrms_front_end:
      type: tosca.nodes.indigo.LRMS.FrontEnd.Kubernetes
      capabilities:
        endpoint:
          properties:
            ports:
              http_port:
                protocol: tcp
                source: 80
              https_port:
                protocol: tcp
                source: 443
      properties:
        admin_username: kubeuser
        admin_token: ""
        install_nfs_client: true
        install_kubeapps: false
        version: { get_input: kube_version }
        cri_runtime: docker
        csi_driver: NFS
        public_dns_name: { get_input: dns_name}
        cert_manager: true
      requirements:
        - host: front

    front:
      type: tosca.nodes.indigo.Compute
      capabilities:
        endpoint:
          properties:
            dns_name: kubeserver
            network_name: PUBLIC
            additional_dns_names:
              - { get_input: dns_name}
        host:
          properties:
            num_cpus: { get_input: fe_cpus }
            mem_size: { get_input: fe_mem }
        os:
          properties:
            distribution: ubuntu
            type: linux
      requirements:
        - local_storage:
            node: fe_block_storage
            relationship:
              type: AttachesTo
              properties:
                location: /pv

    fe_block_storage:
      type: tosca.nodes.BlockStorage
      properties:
        size: { get_input: fe_disk_size }

    wn_node:
      type: tosca.nodes.indigo.LRMS.WorkerNode.Kubernetes
      properties:
        front_end_ip: { get_attribute: [ front, private_address, 0 ] }
        version: { get_input: kube_version }
        cri_runtime: docker
        csi_driver: NFS
      requirements:
        - host: wn

    wn:
      type: tosca.nodes.indigo.Compute
      capabilities:
        scalable:
          properties:
            count: { get_input: wn_num }
        host:
          properties:
            disk_size: { get_input: wn_disk_size }
            num_cpus: { get_input: wn_cpus }
            mem_size: { get_input: wn_mem }
        os:
          properties:
            distribution: ubuntu
            type: linux

  outputs:
    enes_web:
      value: { concat: [ 'https://', get_input: dns_name, '/' ] }
