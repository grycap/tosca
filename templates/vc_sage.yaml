tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - grycap_custom_types: https://raw.githubusercontent.com/grycap/tosca/main/custom_types.yaml


description: Deploy Jupyter Notebook.

metadata:
  template_version: "1.0.0"
  template_name: SAGE EDC
  display_name: Deploy Jupyter Notebook
  icon: images/jupyter.png
  tabs:
    VM Data:
      - num_cpus
      - mem_size
      - disk_size
      - domain_name
    Data Space Data:
      - issuer_did
      - federated_catalog_address
      - dataspace_hub_url
      - connector_id
      - compose_profiles
      - keycloak_address
      - identity_hub_address
      - vault_address
      - letsencrypt_email

topology_template:
  inputs:

    num_cpus:
      type: integer
      description: Number of virtual cpus for the VM
      default: 2
      constraints:
        - valid_values: [ 2, 4, 8, 16, 32, 64, 1 ]
    mem_size:
      type: scalar-unit.size
      description: Amount of memory for the VM
      default: 4 GB
      constraints:
        - valid_values: [ 4 GB, 8 GB, 16 GB, 32 GB, 64 GB, 128 GB, 256 GB, 512 GB, 2 GB ]
    disk_size:
      type: scalar-unit.size
      description: Size of the root disk of the VM (in case of 0 disk will no be resized)
      default: 20 GiB
      constraints:
        - valid_values: [ 20 GiB, 50 GiB, 100 GiB, 200 GiB, 0 GiB ]

    domain_name:
      default: ds.fedcloud.eu
      description: DNS domain name to be used for the deployment.
      type: string

    issuer_did:
      default: ''
      description: DID of the issuer to be used for the VC issuance
      type: string
      required: true
    federated_catalog_address:
      default: ''
      description: Address of the Dataspace Federated Catalog
      type: string
      required: true
    dataspace_hub_url:
      default: ''
      description: URL of the Dataspace Hub
      type: string
      required: true
    connector_id:
      default: ''
      description: Dataspace Connector ID
      type: string
      required: true
    compose_profiles:
      description: Comma separated compose profiles to be used for the deployment (connector, identity, keycloak, storage)
      type: string
      default: 'connector'
      required: true
    letsencrypt_email:
      default: 'admin@example.com'
      description: Email address to be used for Let's Encrypt certificate generation
      type: string

    keycloak_address:
      default: ''
      description: Address of the Keycloak server (only needed if the 'keycloak' compose profile is not used)
      type: string
    identity_hub_address:
      default: ''
      description: Address of the Identity Hub server (only needed if the 'identity' compose profile is not used)
      type: string
    vault_address:
      default: ''
      description: Address of the Vault server (only needed if the 'identity' compose profile is not used)
      type: string

  node_templates:

    jupyter:
      type: tosca.nodes.ec3.Application
      artifacts:
        docker_role:
          file: grycap.docker
          type: tosca.artifacts.AnsibleGalaxy.role
      capabilities:
        endpoint:
          properties:
            ports:
              port_http:
                protocol: tcp
                source: 80
              port_https:
                protocol: tcp
                source: 443
      interfaces:
        Standard:
          configure:
            implementation: https://raw.githubusercontent.com/grycap/tosca/sage/artifacts/vc_compose.yml
            inputs:
              letsencrypt_email: { get_input: letsencrypt_email }
              dns_name: { get_input: domain_name }
              compose_profiles: { get_input: compose_profiles }
              keycloak_address: { get_input: keycloak_address }
              identity_hub_address: { get_input: identity_hub_address }
              vault_address: { get_input: vault_address }
              issuer_did: { get_input: issuer_did }
              federated_catalog_address: { get_input: federated_catalog_address }
              dataspace_hub_url: { get_input: dataspace_hub_url }
              connector_id: { get_input: connector_id }
      requirements:
        - host: simple_node

    simple_node:
      type: tosca.nodes.indigo.Compute
      capabilities:
        endpoint:
          properties:
            additional_dns_names:
              - { concat: [ '*@', get_input: domain_name ] }
            network_name: PUBLIC
        host:
          properties:
            disk_size: { get_input: disk_size }
            num_cpus: { get_input: num_cpus }
            mem_size: { get_input: mem_size }
        os:
          properties:
            type: linux

  outputs:
    connector_url:
      value: { concat: [ 'https://connector.', get_input: [ domain_name ], '/api' ] }
    dashboard_url:
      value: { concat: [ 'https://dashboard.', get_input: [ domain_name ], '/' ] }
