tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - grycap_custom_types: https://raw.githubusercontent.com/grycap/tosca/main/custom_types.yaml


description: Deploy yProvStore, a provenance store for scientific workflows.

metadata:
  template_version: "1.0.0"
  template_name: yProvStore
  display_name: Deploy yProvStore

topology_template:
  inputs:
    num_cpus:
      type: integer
      description: Number of virtual cpus for the VM
      default: 2
    mem_size:
      type: scalar-unit.size
      description: Amount of memory for the VM
      default: 4 GiB
    disk_size:
      type: scalar-unit.size
      description: Size of the root disk of the VM (in case of 0 disk will no be resized)
      default: 20 GiB

    storage_size:
      type: scalar-unit.size
      description: Size of the extra HD added to the instance
      default: 50 GiB
      constraints:
        - valid_values: [ 50 GiB, 100 GiB, 200 GiB, 500 GiB, 1 TiB, 2 TiB, 10 TiB, 20 TiB, 40 TiB, 100 TiB ]
    mount_path:
      type: string
      description: Path to mount the extra disk
      default: /data


    use_oidc_auth:
      type: boolean
      description: Whether to use OIDC authentication for yProvStore
      default: false

    oidc_instrospection_endpoint:
      type: string
      description: OIDC introspection endpoint
      default: 'https://enes-proxy.pilot.eosc-beyond.eu/auth/realms/enes/protocol/openid-connect/token/introspect'
    oidc_required_entitlements:
      type: string
      description: Required entitlement to access yProvStore
      default: 'urn:mace:egi.eu:group:enes.pilot.eosc-beyond.eu:role=member#aai.egi.eu'
    oidc_client_id:
      type: string
      description: OIDC Client ID
      default: ''
    oidc_client_secret:
      type: string
      description: OIDC Client Secret
      default: ''

    letsencrypt_email:
      default: changeme@email.com
      description: Email to be used for Let's Encrypt certificates
      type: string

    dns_name:
      default: yprovstore-test.vm.fedcloud.eu
      description: DNS hostname to access yProvStore
      type: string

    db_connection_string:
      default: ''
      description: Database connection string for yProvStore (format postgresql://user:pass@pgserver/db)
      type: string
    storage_connection_string:
      default: ''
      description: Storage connection string for yProvStore (format s3://access_key:secret_key@endpoint/bucket)
      type: string
    document_size_limit:
      default: 100
      description: Maximum size in MB of documents that can be stored in yProvStore
      type: integer

  node_templates:

    yprovstore:
      type: tosca.nodes.ec3.Application
      artifacts:
        docker_role:
          file: grycap.docker
          type: tosca.artifacts.AnsibleGalaxy.role
      capabilities:
        endpoint:
          properties:
            ports:
              port_http:
                protocol: tcp
                source: 80
              port_https:
                protocol: tcp
                source: 443
      interfaces:
        Standard:
          configure:
            implementation: https://raw.githubusercontent.com/grycap/tosca/eosc_beyond/artifacts/yprovstore.yml
            inputs:
              letsencrypt_email: { get_input: letsencrypt_email }
              dns_name: { get_input: dns_name }
              public_ip: { get_attribute: [ simple_node, public_address, 0 ] }
              db_connection_string: { get_input: db_connection_string }
              storage_connection_string: { get_input: storage_connection_string }
              document_size_limit: { get_input: document_size_limit }
              use_oidc_auth: { get_input: use_oidc_auth }
              oidc_instrospection_endpoint: { get_input: oidc_instrospection_endpoint }
              oidc_required_entitlements: { get_input: oidc_required_entitlements }
              oidc_client_id: { get_input: oidc_client_id }
              oidc_client_secret: { get_input: oidc_client_secret }
      requirements:
        - host: simple_node

    simple_node:
      type: tosca.nodes.indigo.Compute
      capabilities:
        endpoint:
          properties:
            network_name: PUBLIC
            additional_dns_names:
              - { get_input: dns_name }
        host:
          properties:
            disk_size: { get_input: disk_size }
            num_cpus: { get_input: num_cpus }
            mem_size: { get_input: mem_size }
        os:
          properties:
            type: linux
            distribution: ubuntu
      requirements:
        - local_storage:
            node: my_block_storage
            capability: tosca.capabilities.Attachment
            relationship:
              type: tosca.relationships.AttachesTo
              properties:
                location: { get_input: mount_path }

    my_block_storage:
      type: tosca.nodes.BlockStorage
      properties:
        size: { get_input: storage_size }

  outputs:
    yprovstore_url:
      value: { concat: [ 'https://', get_attribute: [ simple_node, public_address, 0 ], '/docs' ] }
    yprovstore_url_dns:
      value: { concat: [ 'https://', get_input: [ dns_name ], '/docs' ] }
