---
- name: Install jupyter
  hosts: localhost
  connection: local
  vars:
    oai_harvester_letsencrypt_email: "{{ letsencrypt_email }}"
    traefik_dns_name: "{{ dns_name | default('oaiharvester.example.com') }}"
    traefik_public_ip: "{{ public_ip | default(ansible_default_ipv4.address) }}"
    docker_image: "{{ oai_harvester_image | default('artini76/simple-oai-collector:latest') }}"
  roles:
    - role: 'grycap.docker'
  tasks:
    - name: Create oai_harvester directory
      file:
        path: /opt/oai_harvester
        state: directory
        mode: '777'

    - name: Create docker-compose file
      copy:
        content: |
          version: "3.3"
          services:
            traefik:
              image: "traefik:v2.11"
              container_name: "traefik"
              command:
                # - "--log.level=DEBUG"
                - "--api.insecure=true"
                - "--providers.docker=true"
                - "--providers.docker.exposedbydefault=false"
                - "--entrypoints.web.address=:80"
                - "--entrypoints.websecure.address=:443"
                - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
                - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
                - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
                - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
                - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
                #- "--certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
                - "--certificatesresolvers.myresolver.acme.email={{ oai_harvester_letsencrypt_email }}"
                - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
              ports:
                - "80:80"
                - "443:443"
                - "8080:8080"
              volumes:
                - "./letsencrypt:/letsencrypt"
                - "/var/run/docker.sock:/var/run/docker.sock:ro"
            oai_harvester:
              image: "{{ docker_image }}"
              expose:
                - "8080"
              volumes:
                - "./config:/config"
              restart: unless-stopped
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.oai_harvester.service=oai_harvester"
                - "traefik.http.routers.oai_harvester.rule=Host(`{{ traefik_dns_name }}`, `{{ traefik_public_ip }}`)"
                - "traefik.http.routers.oai_harvester.entrypoints=websecure"
                - "traefik.http.routers.oai_harvester.tls.certresolver=myresolver"
                - "traefik.http.services.oai_harvester.loadbalancer.server.port=8080"
        dest: /opt/oai_harvester/docker-compose.yaml
        mode: '644'

    - name: Exec docker-compose up
      community.docker.docker_compose_v2:
        project_src: /opt/oai_harvester/
        state: present