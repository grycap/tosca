---
- hosts: localhost
  connection: local
  vars:
    vnode_prefix: "{{ slurm_node_prefix | default('vnode-') }}"
    wn_group_name: "{{ slurm_wn_group_name | default('wn') }}"
  pre_tasks:
    - name: Stop and disable firewalls
      service:
        name: "{{ item }}"
        enabled: false
        state: stopped
      ignore_errors: true
      loop:
        - ufw
        - firewalld
    # Avoid error in ntp installation in Debian
    - name: Remove systemd-timesyncd in Debian systems
      package:
        name: systemd-timesyncd
        state: absent
      ignore_errors: true
      when: ansible_os_family == "Debian"
    - name: Set slurm_wn_nodenames if not defined
      set_fact:
        slurm_wn_nodenames: '{{ groups[wn_group_name]|map("extract", hostvars, "ansible_hostname")|list if wn_group_name in groups else [] }}'
      when: slurm_wn_nodenames is not defined or slurm_wn_nodenames is none
  roles:
    - role: grycap.nfs
      nfs_mode: 'front'
      nfs_only_v4: true
      nfs_exports: [{path: "/home", export: "{{ vnode_prefix }}*.localdomain(rw,async,no_root_squash,no_subtree_check,insecure,crossmnt)"}]
      when: slurm_nfs is undefined or slurm_nfs
    - role: grycap.slurm
      slurm_type_of_node: 'front'
      slurm_wn_num: '{{ wn_num }}'
      slurm_wn_ips: '{{ wn_ips }}'
      slurm_server_ip: '{{ slurm_front_end_ip }}'
      slurm_vnode_prefix: '{{ vnode_prefix }}'
