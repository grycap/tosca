---
- name: Install EDC
  hosts: localhost
  connection: local
  vars:
    branch: develop
    domain_name: "{{ dns_name | default('example.com') }}"
    password_env_vars:
      - COMMON_DB_PASSWORD
      - CONNECTOR_DB_PASSWORD
      - KEYCLOAK_DB_PASSWORD
      - KEYCLOAK_ADMIN_PASSWORD
      - IDENTITY_HUB_DB_PASSWORD
      - STORAGE_SECRET_KEY
      - CONNECTOR_STS_CLIENT_SECRET_ALIAS
  pre_tasks:
    - name: Validate required DID and dataspace variables
      assert:
        that:
          - issuer_did is defined
          - federated_catalog_address is defined
          - dataspace_hub_url is defined
          - connector_id is defined
          - catalog_api_key is defined
        fail_msg: >-
          Missing required variables. You must define issuer_did,
          federated_catalog_address, connector_id, dataspace_hub_url and catalog_api_key.

    - name: Normalize compose profiles
      set_fact:
        compose_profiles_list: >-
          {{ (compose_profiles | default('connector')).split(',')
             | map('trim')
             | reject('equalto', '')
             | map('lower')
             | unique
             | list }}

    - name: Validate compose profiles values
      assert:
        that:
          - "'connector' in compose_profiles_list"
          - (compose_profiles_list | difference(['connector', 'keycloak', 'identity', 'storage']) | length) == 0
        fail_msg: >-
          Invalid COMPOSE_PROFILES. Allowed profiles are: connector (mandatory),
          keycloak, identity, storage.

    - name: Validate external addresses for disabled profiles
      assert:
        that:
          - "'keycloak' in compose_profiles_list or keycloak_address is defined"
          - "'identity' in compose_profiles_list or identity_hub_address is defined"
          - "'identity' in compose_profiles_list or vault_address is defined"
        fail_msg: >-
          Missing required variables for disabled profiles. If keycloak profile is not enabled,
          define keycloak_address. If identity profile is not enabled, define
          identity_hub_address and vault_address.

    - name: Set default values for keycloak_address when keycloak profile is enabled
      set_fact:
        keycloak_address: "https://keycloak.{{ domain_name }}"
      when:
        - "'keycloak' in compose_profiles_list"

    - name: Set default values for identity_hub_address and vault_address when identity profile is enabled
      set_fact:
        identity_hub_address: "https://identity-hub.{{ domain_name }}"
        vault_address: "https://vault.{{ domain_name }}"
      when:
        - "'identity' in compose_profiles_list"
  roles:
    - role: 'grycap.docker'
  tasks:
    - name: Install make and openssl packages on Debian/RedHat
      package:
        name:
          - make
          - openssl
        state: present

    - name: install epel-release
      package:
        name: epel-release
      when: ansible_os_family == 'RedHat'

    - name: Install htpasswd package on Debian/RedHat
      package:
        name:
          - "{{ 'apache2-utils' if ansible_os_family == 'Debian' else 'httpd-tools' }}"
          - "{{ 'python3-venv' if ansible_os_family == 'Debian' else 'python3-virtualenv' }}"
        state: present

    - name: check if EDC files are already downloaded
      stat:
        path: /opt/edc/deployment/instruction/docker
      register: env_file_stat

    - name: Download EDC files
      git:
        repo: 'https://gitlab.pcss.pl/daisd-public/dpi-pipelines/psnc-edc-mvds/psnc-edc-mvds'
        dest: /opt/edc/
        version: "{{ branch }}"
      when: not env_file_stat.stat.exists

    - name: Fix permissions for some scripts
      file:
        path: "/opt/edc/deployment/instruction/docker/scripts/{{ item }}"
        mode: '0755'
      loop:
        - vault-init-unseal.sh
        - render/render-dashboard.sh

    - name: Check if cert file exists
      copy:
        src: /opt/edc/deployment/instruction/docker/scripts/configure/config/certs/consumer_public.pem
        dest: /opt/edc/deployment/instruction/docker/scripts/configure/config/certs/connector_public.pem
        mode: '0644'
        remote_src: true
      ignore_errors: true

    - name: make init
      command: make init
      args:
        chdir: /opt/edc/deployment/instruction/docker
        creates: /opt/edc/deployment/instruction/docker/.env

    - name: Create secrets directory
      file:
        path: /opt/edc/deployment/instruction/docker/.secrets
        state: directory
        mode: '0777'

    - name: Generate passwords in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^{{ item }}='
        line: "{{ item }}={{ lookup('ansible.builtin.password', '/opt/edc/deployment/instruction/docker/.secrets/' ~ item ~ ' length=32') }}"
      loop: "{{ password_env_vars }}"

    - name: Update hosts variables in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^{{ item.env_key }}='
        line: "{{ item.env_key }}={{ item.value }}"
      loop:
        - { env_key: 'CONNECTOR_HOST', value: 'connector.{{ domain_name }}' }
        - { env_key: 'DASHBOARD_HOST', value: 'dashboard.{{ domain_name }}' }
        - { env_key: 'KEYCLOAK_HOST', value: 'keycloak.{{ domain_name }}' }
        - { env_key: 'TRAEFIK_DASHBOARD_HOST', value: 'traefik.{{ domain_name }}' }
        - { env_key: 'IDENTITY_HUB_HOST', value: 'identity-hub.{{ domain_name }}' }
        - { env_key: 'VAULT_HOST', value: 'vault.{{ domain_name }}' }
        - { env_key: 'CONSUMER_BACKEND_HOST', value: 'consumer-backend.{{ domain_name }}' }
        - { env_key: 'STORAGE_HOST', value: 'storage.{{ domain_name }}' }

    - name: Update CATALOG_API_KEY in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^CATALOG_API_KEY='
        line: "CATALOG_API_KEY={{ catalog_api_key }}"

    - name: Update LETSENCRYPT_EMAIL in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^LETSENCRYPT_EMAIL='
        line: "LETSENCRYPT_EMAIL={{ letsencrypt_email }}"

    - name: Generate IDENTITY_HUB_SUPERUSER_SECRET
      shell: openssl rand -base64 32 | tr -d '\r\n' > /opt/edc/deployment/instruction/docker/.secrets/IDENTITY_HUB_SUPERUSER_SECRET
      args:
        creates: /opt/edc/deployment/instruction/docker/.secrets/IDENTITY_HUB_SUPERUSER_SECRET

    - name: Update IDENTITY_HUB_SUPERUSER_KEY in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^IDENTITY_HUB_SUPERUSER_KEY='
        line: >-
          IDENTITY_HUB_SUPERUSER_KEY={{ (identity_hub_superuser_username | default('super-user') | b64encode) ~ '.' ~ (lookup('ansible.builtin.file', '/opt/edc/deployment/instruction/docker/.secrets/IDENTITY_HUB_SUPERUSER_SECRET') | trim | b64encode) }}

    - name: check if TRAEFIK_PASS file exists
      stat:
        path: /opt/edc/deployment/instruction/docker/.secrets/TRAEFIK_PASS
      register: traefik_pass_file

    - name: Generate temporary TRAEFIK_PASS
      set_fact:
        traefik_pass: "{{ lookup('ansible.builtin.password', '/opt/edc/deployment/instruction/docker/.secrets/TRAEFIK_PASS length=20 chars=ascii_letters,digits') }}"

    - name: Generate TRAEFIK_BASIC_AUTH value
      command: htpasswd -nb admin {{ traefik_pass }}
      register: traefik_basic_auth_cmd
      changed_when: false
      when: not traefik_pass_file.stat.exists

    - name: Update TRAEFIK_BASIC_AUTH in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^TRAEFIK_BASIC_AUTH='
        line: "TRAEFIK_BASIC_AUTH={{ traefik_basic_auth_cmd.stdout | regex_replace('\\$', '$$') }}"
      when: not traefik_pass_file.stat.exists

    - name: Update COMPOSE_PROFILES in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^COMPOSE_PROFILES='
        line: COMPOSE_PROFILES={{ compose_profiles_list | join(',') }}

    - name: Update DID and dataspace variables in .env
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^{{ item.env_key }}='
        line: "{{ item.env_key }}={{ vars[item.ansible_var] }}"
      loop:
        - { env_key: 'ISSUER_DID', ansible_var: 'issuer_did' }
        - { env_key: 'FEDERATED_CATALOG_ADDRESS', ansible_var: 'federated_catalog_address' }
        - { env_key: 'DATASPACE_HUB_URL', ansible_var: 'dataspace_hub_url' }
        - { env_key: 'CONNECTOR_ID', ansible_var: 'connector_id' }

    - name: Update external addresses in .env when defined
      lineinfile:
        path: /opt/edc/deployment/instruction/docker/.env
        regexp: '^{{ item.env_key }}='
        line: "{{ item.env_key }}={{ vars[item.var_name] }}"
      loop:
        - { env_key: 'KEYCLOAK_ADDRESS', var_name: 'keycloak_address'}
        - { env_key: 'IDENTITY_HUB_ADDRESS', var_name: 'identity_hub_address'}
        - { env_key: 'VAULT_ADDRESS', var_name: 'vault_address'}
      when: item.var_name in vars

    - name: make render
      command: make render
      args:
        chdir: /opt/edc/deployment/instruction/docker
        creates: /opt/edc/deployment/instruction/docker/.generated/config/connector.properties

    - name: Prepare ACME file for TLS certificates
      file:
        path: /opt/edc/deployment/instruction/docker/acme.json
        mode: '0600'

    - name: Check if vault-init is needed
      command: grep VAULT_ROOT_TOKEN=hvs /opt/edc/deployment/instruction/docker/.env.secrets
      register: vault_init_check
      failed_when: false
      changed_when: false

    - name: make vault-init
      command: make vault-init
      args:
        chdir: /opt/edc/deployment/instruction/docker
      when:
        - "'identity' in compose_profiles_list"
        - vault_init_check.rc != 0

    - name: make up
      command: make up
      args:
        chdir: /opt/edc/deployment/instruction/docker

    - name: Set extra_args var
      set_fact:
        extra_args: ''

    - name: Set extra_args var in py3.11
      set_fact:
        extra_args: --break-system-packages
      when: ansible_python_version is version('3.11', '>=')

    - name: Install pip required packages
      pip:
        name:
          - virtualenv
        executable: pip3
        extra_args: "{{ extra_args }}"

    - name: Install python dependencies
      pip:
        requirements: /opt/edc/deployment/instruction/docker/scripts/keycloak/requirements.txt
        extra_args: "{{ extra_args }}"

    - name: Create virtualenv
      command:
        cmd: python -m virtualenv --system-site-packages /opt/edc/deployment/instruction/docker/venv
        creates: /opt/edc/deployment/instruction/docker/venv

    - name: Wait for Keycloak endpoint to be active
      uri:
        url: "{{ keycloak_address }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
        validate_certs: false
      register: keycloak_health
      until: keycloak_health.status == 200
      retries: 30
      delay: 10
      when:
        - "'keycloak' in compose_profiles_list"

    - name: make configure-keycloak-full
      shell: make configure-keycloak-full && touch /opt/edc/deployment/instruction/docker/.keycloak_configured
      args:
        chdir: /opt/edc/deployment/instruction/docker
        creates: /opt/edc/deployment/instruction/docker/.keycloak_configured
      when:
        - "'keycloak' in compose_profiles_list"

    - name: make init-dataspace
      shell: make init-dataspace && touch /opt/edc/deployment/instruction/docker/.dataspace_initialized
      args:
        chdir: /opt/edc/deployment/instruction/docker
        creates: /opt/edc/deployment/instruction/docker/.dataspace_initialized

    - name: make verify-dataspace
      command: make verify-dataspace
      args:
        chdir: /opt/edc/deployment/instruction/docker

    - name: Read .env file
      slurp: src=/opt/edc/deployment/instruction/docker/.env
      register: slurpfile
      ignore_errors: true
    - name: env_file
      debug: msg="{{ slurpfile['content'] | b64decode }}"
      ignore_errors: true
